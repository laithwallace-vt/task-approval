<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Approval · Responsive Prototype</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --purple: #7C5CFC;
    --purple-light: #EDE9FF;
    --purple-dim: rgba(124, 92, 252, 0.12);
    --red: #E5403A;
    --red-light: #FFF0F0;
    --green: #16A34A;
    --green-light: #F0FDF4;
    --text-primary: rgba(15,15,20,1);
    --text-secondary: rgba(15,15,20,0.6);
    --text-tertiary: rgba(15,15,20,0.4);
    --border: rgba(15,15,20,0.1);
    --border-focus: rgba(124,92,252,0.5);
    --surface: #ffffff;
    --surface-hover: rgba(15,15,20,0.04);
    --surface-subtle: #F8F8FA;
    --radius-sm: 4px;
    --radius-md: 6px;
    --radius-lg: 8px;
    --shadow-modal: 0 8px 32px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
    --font: 'DM Sans', system-ui, -apple-system, sans-serif;
  }

  body {
    font-family: var(--font);
    background: #EEEEF2;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Breakpoint toggle bar ── */
  .bp-bar {
    background: #1A1A22;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 10px 16px;
    position: sticky;
    top: 0;
    z-index: 1000;
    flex-shrink: 0;
  }
  .bp-label {
    color: rgba(255,255,255,0.4);
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-right: 8px;
  }
  .bp-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 5px;
    color: rgba(255,255,255,0.5);
    font-family: var(--font);
    font-size: 12px;
    cursor: pointer;
    padding: 5px 12px;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .bp-btn:hover { background: rgba(255,255,255,0.14); color: #fff; }
  .bp-btn.active {
    background: var(--purple);
    border-color: var(--purple);
    color: #fff;
  }
  .bp-divider { width: 1px; height: 16px; background: rgba(255,255,255,0.1); margin: 0 8px; }

  /* ── Viewport wrapper ── */
  .viewport-wrap {
    flex: 1;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 32px 16px;
  }
  .viewport {
    width: 100%;
    max-width: 1440px;
    transition: max-width 0.3s cubic-bezier(0.4,0,0.2,1);
    background: #EEEEF2;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.1);
  }
  .viewport.bp-900 { max-width: 900px; }
  .viewport.bp-600 { max-width: 600px; }
  .viewport.bp-375 { max-width: 375px; }

  /* ── Modal scaffold ── */
  .modal-wrap {
    padding: 32px;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    min-height: 600px;
  }

  .modal {
    background: var(--surface);
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-modal);
    width: 100%;
    max-width: 960px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Header (Slot 1) ── */
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    height: 48px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 12px;
  }
  .modal-header-left {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
    flex: 1;
    overflow: hidden;
  }
  .task-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .task-link {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 13px;
    color: var(--text-secondary);
    text-decoration: none;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .task-link:hover { color: var(--purple); }
  .task-link svg { flex-shrink: 0; }
  .modal-header-right {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
  }
  .header-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-right: 8px;
  }
  .meta-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 13px;
    color: var(--text-secondary);
    white-space: nowrap;
  }
  .meta-avatar {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: linear-gradient(135deg, #a78bfa, #7C5CFC);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    color: white;
    font-weight: 600;
    flex-shrink: 0;
  }
  .icon-btn {
    width: 28px;
    height: 28px;
    border: none;
    background: transparent;
    border-radius: var(--radius-sm);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-secondary);
    transition: background 0.12s, color 0.12s;
  }
  .icon-btn:hover { background: var(--surface-hover); color: var(--text-primary); }

  /* ── Step strip (mobile stepper - Slot 1.5) ── */
  .step-strip {
    display: none;
    align-items: center;
    padding: 0 16px;
    height: 40px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    gap: 8px;
    flex-shrink: 0;
  }
  .step-back-btn {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 13px;
    color: var(--text-secondary);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    flex-shrink: 0;
  }
  .step-back-btn:hover { color: var(--purple); }
  .step-strip-center {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    min-width: 0;
  }
  .step-strip-label {
    font-size: 13px;
    color: var(--text-primary);
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .step-strip-count {
    font-size: 12px;
    color: var(--text-tertiary);
    flex-shrink: 0;
  }
  .step-progress-wrap {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .step-progress-track {
    width: 56px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .step-progress-fill {
    height: 100%;
    background: var(--purple);
    border-radius: 2px;
    transition: width 0.25s ease;
  }
  /* Step dots for very small */
  .step-dots {
    display: flex;
    gap: 4px;
    align-items: center;
  }
  .step-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.2s;
  }
  .step-dot.active { background: var(--purple); }
  .step-dot.done { background: var(--purple); opacity: 0.4; }

  /* ── Body layout (Slot 2 + 3) ── */
  .modal-body {
    display: grid;
    grid-template-columns: 200px 1fr 280px;
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }

  /* ── Sidebar nav (left) ── */
  .sidebar-nav {
    border-right: 1px solid var(--border);
    padding: 16px 0;
    overflow-y: auto;
  }
  .sidebar-nav-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 16px;
    font-size: 13px;
    color: var(--text-secondary);
    cursor: pointer;
    transition: background 0.1s, color 0.1s;
    position: relative;
  }
  .sidebar-nav-item:hover { background: var(--surface-hover); color: var(--text-primary); }
  .sidebar-nav-item.active {
    color: var(--purple);
    background: var(--purple-dim);
    font-weight: 500;
  }
  .sidebar-nav-item.active::before {
    content: '';
    position: absolute;
    left: 0;
    top: 4px;
    bottom: 4px;
    width: 3px;
    background: var(--purple);
    border-radius: 0 2px 2px 0;
  }
  .step-indicator {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    border: 1.5px solid var(--text-tertiary);
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .sidebar-nav-item.active .step-indicator {
    background: var(--purple);
    border-color: var(--purple);
  }
  .sidebar-nav-item.done .step-indicator {
    background: var(--green);
    border-color: var(--green);
  }

  /* ── Form body (centre) ── */
  .form-pane {
    overflow-y: auto;
    padding: 20px 24px;
    border-right: 1px solid var(--border);
  }
  .section-accordion {
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-bottom: 12px;
  }
  .section-accordion-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    cursor: pointer;
    background: var(--surface);
    transition: background 0.1s;
    user-select: none;
  }
  .section-accordion-header:hover { background: var(--surface-hover); }
  .section-accordion-body { padding: 16px; border-top: 1px solid var(--border); }

  .form-section-title {
    font-size: 16px;
    font-weight: 500;
    color: var(--text-primary);
    margin-bottom: 4px;
  }
  .form-section-sub {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 16px;
  }
  .form-group {
    margin-bottom: 16px;
  }
  .form-label {
    font-size: 13px;
    color: var(--text-primary);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 3px;
  }
  .required-star { color: var(--red); }
  .form-input {
    width: 100%;
    height: 32px;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 0 10px;
    font-size: 13px;
    font-family: var(--font);
    color: var(--text-primary);
    background: var(--surface);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .form-input:focus {
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px rgba(124,92,252,0.1);
  }
  .form-input.with-icon { padding-left: 28px; }
  .input-wrap { position: relative; }
  .input-icon {
    position: absolute;
    left: 8px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-tertiary);
    pointer-events: none;
  }
  .form-textarea {
    width: 100%;
    min-height: 72px;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 8px 10px;
    font-size: 13px;
    font-family: var(--font);
    color: var(--text-secondary);
    background: var(--surface);
    outline: none;
    resize: vertical;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .form-textarea:focus {
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px rgba(124,92,252,0.1);
  }
  .radio-group { display: flex; flex-direction: column; gap: 8px; }
  .radio-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-primary);
    cursor: pointer;
  }
  .radio-item input[type="radio"] { accent-color: var(--purple); width: 14px; height: 14px; cursor: pointer; }

  /* ── Right panel (Slot 3) ── */
  .details-panel {
    overflow-y: auto;
    padding: 0;
  }
  .panel-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 1;
  }
  .panel-tab {
    font-size: 13px;
    color: var(--text-secondary);
    padding: 12px 0;
    margin-right: 20px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .panel-tab:hover { color: var(--text-primary); }
  .panel-tab.active {
    color: var(--purple);
    border-bottom-color: var(--purple);
    font-weight: 500;
  }
  .panel-content { padding: 16px; }
  .ai-card {
    border: 1px solid var(--purple);
    border-radius: var(--radius-lg);
    padding: 12px;
    margin-bottom: 16px;
    background: var(--purple-light);
  }
  .ai-card-header {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 500;
    color: var(--purple);
    margin-bottom: 6px;
  }
  .ai-card-body {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.5;
    margin-bottom: 8px;
  }
  .ai-card-footer {
    font-size: 11px;
    color: var(--text-tertiary);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .meta-row {
    display: flex;
    flex-direction: column;
    gap: 2px;
    margin-bottom: 14px;
  }
  .meta-row-label {
    font-size: 11px;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .meta-row-value {
    font-size: 13px;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .budget-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 11px;
    color: var(--green);
    background: var(--green-light);
    border-radius: 10px;
    padding: 1px 6px;
  }
  .line-items-section { margin-top: 4px; }
  .line-items-header {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }
  .line-item {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
  }
  .line-item:last-child { border-bottom: none; }
  .line-item-name { font-size: 13px; color: var(--text-primary); }
  .line-item-type { font-size: 11px; color: var(--text-tertiary); margin-top: 1px; }
  .line-item-amount { font-size: 13px; font-weight: 500; color: var(--text-primary); }

  /* ── Footer (Slot 4) ── */
  .modal-footer {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    gap: 8px;
    flex-shrink: 0;
  }
  .btn {
    height: 32px;
    border-radius: var(--radius-md);
    border: none;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    padding: 0 14px;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn-ghost {
    background: transparent;
    color: var(--text-secondary);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--surface-hover); color: var(--text-primary); }
  .btn-danger {
    background: var(--red);
    color: white;
  }
  .btn-danger:hover { background: #c93530; }
  .btn-primary {
    background: var(--purple);
    color: white;
  }
  .btn-primary:hover { background: #6a4de0; }
  .btn-next {
    background: var(--purple);
    color: white;
  }
  .btn-next:hover { background: #6a4de0; }

  /* ── Bottom sheet (mobile) ── */
  .bottom-sheet-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 500;
    opacity: 0;
    transition: opacity 0.25s;
  }
  .bottom-sheet-overlay.open {
    display: block;
    opacity: 1;
  }
  .bottom-sheet {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    border-radius: 12px 12px 0 0;
    padding: 0 0 env(safe-area-inset-bottom, 0);
    z-index: 501;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    max-height: 75vh;
    overflow-y: auto;
  }
  .bottom-sheet.open {
    transform: translateY(0);
  }
  .sheet-handle {
    width: 32px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 12px auto 0;
  }
  .sheet-header {
    padding: 12px 16px 8px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    border-bottom: 1px solid var(--border);
  }
  .sheet-steps {
    padding: 8px 0 16px;
  }
  .sheet-step-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    cursor: pointer;
    transition: background 0.1s;
  }
  .sheet-step-item:hover { background: var(--surface-hover); }
  .sheet-step-indicator {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-tertiary);
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .sheet-step-item.active .sheet-step-indicator {
    background: var(--purple);
    border-color: var(--purple);
    color: white;
  }
  .sheet-step-item.done .sheet-step-indicator {
    background: var(--green);
    border-color: var(--green);
    color: white;
  }
  .sheet-step-name { font-size: 13px; color: var(--text-primary); }
  .sheet-step-item.active .sheet-step-name { font-weight: 500; color: var(--purple); }
  .sheet-step-item.done .sheet-step-name { color: var(--text-secondary); }

  /* ── BREAKPOINT RESPONSIVE RULES ── */

  /* 900px: Collapse sidebar → step strip, panel stays as tab */
  @media (max-width: 900px) {
    .modal-wrap { padding: 16px; }
    .modal-body { grid-template-columns: 1fr 280px; }
    .sidebar-nav { display: none; }
    .step-strip { display: flex; }
    .header-meta { display: none; }
  }

  /* 700px: Stack panel under form (full width tabs) */
  @media (max-width: 700px) {
    .modal-body { grid-template-columns: 1fr; }
    .form-pane { border-right: none; }
    .details-panel { border-top: 1px solid var(--border); }
    .panel-tabs { position: relative; }
  }

  /* 480px: Compact header, details panel as bottom-accessible */
  @media (max-width: 480px) {
    .modal-wrap { padding: 8px; }
    .task-link .link-text { display: none; }
    .step-strip-label { font-size: 12px; }
    .form-pane { padding: 16px; }
    .panel-content { padding: 12px; }
    .modal-footer {
      padding: 10px 12px;
    }
    /* On mobile, show step count as dots not text */
    .step-strip-count { display: none; }
  }

  /* ── Viewport-scoped overrides (for the demo toggle) ── */
  .viewport.bp-900 .modal-body { grid-template-columns: 1fr 280px; }
  .viewport.bp-900 .sidebar-nav { display: none; }
  .viewport.bp-900 .step-strip { display: flex; }
  .viewport.bp-900 .header-meta { display: none; }

  .viewport.bp-600 .modal-body { grid-template-columns: 1fr; }
  .viewport.bp-600 .sidebar-nav { display: none; }
  .viewport.bp-600 .step-strip { display: flex; }
  .viewport.bp-600 .header-meta { display: none; }
  .viewport.bp-600 .form-pane { border-right: none; }
  .viewport.bp-600 .details-panel { border-top: 1px solid var(--border); }

  /* bp-375: Full-screen modal */
  .viewport.bp-375 .modal-wrap { padding: 0; min-height: 100%; align-items: stretch; }
  .viewport.bp-375 .modal { border-radius: 0; height: 100%; max-height: none; box-shadow: none; border-left: none; border-right: none; border-bottom: none; }

  /* bp-375: Header */
  .viewport.bp-375 .header-meta { display: none; }
  .viewport.bp-375 .task-link { display: none; }
  .viewport.bp-375 #btnSteps { display: none; }
  .viewport.bp-375 #btnEdit { display: none; }
  .viewport.bp-375 #btnActivity { display: none; }

  /* bp-375: Show mobile tab bar, hide redundant panel tabs */
  .viewport.bp-375 .mobile-tab-bar { display: flex; }
  .viewport.bp-375 .panel-tabs { display: none; }

  /* bp-375: Body layout */
  .viewport.bp-375 .modal-body { grid-template-columns: 1fr; display: block; }
  .viewport.bp-375 .sidebar-nav { display: none; }
  .viewport.bp-375 .form-pane { border-right: none; padding: 16px; }

  /* bp-375: Step strip only visible on Task tab */
  .viewport.bp-375 .step-strip { display: none; }
  .viewport.bp-375 .modal.mobile-tab--task .step-strip { display: flex; }

  /* bp-375: Tab content visibility */
  .viewport.bp-375 .modal.mobile-tab--task .form-pane { display: block; }
  .viewport.bp-375 .modal.mobile-tab--task .details-panel { display: none; }

  .viewport.bp-375 .modal.mobile-tab--details .form-pane { display: none; }
  .viewport.bp-375 .modal.mobile-tab--details .details-panel { display: block; border-top: none; }

const STEPS = [
  { id: 0, name: 'Renewal reason',    pageTitle: 'Renewal reason'    },
  { id: 1, name: 'Contract details',  pageTitle: 'Contract details'  },

  { id: 3, name: 'Additional info',   pageTitle: 'Additional information' },
  { id: 4, name: 'Upload documents',  pageTitle: 'Upload documents'  },
];

let currentStep = 0;
let activePanel = 'details';

// ── Breakpoint toggle ──
function setBreakpoint(bp, btn) {
  const vp = document.getElementById('viewport');
  vp.className = 'viewport' + (bp === 'full' ? '' : ' ' + bp);
  document.querySelectorAll('.bp-bar .bp-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// ── Step navigation ──
function goToStep(n) {
  currentStep = n;
  render();
}
function nextStep() {
  if (currentStep < STEPS.length - 1) { currentStep++; render(); }
}
function prevStep() {
  if (currentStep > 0) { currentStep--; render(); }
}

// ── Bottom sheet ──
function openBottomSheet() {
  document.getElementById('sheetOverlay').classList.add('open');
  document.getElementById('bottomSheet').classList.add('open');
  renderSheetSteps();
}
function closeBottomSheet() {
  document.getElementById('sheetOverlay').classList.remove('open');
  document.getElementById('bottomSheet').classList.remove('open');
}

// ── Mobile tab bar (375px) ──
function switchMobileTab(tab) {
  const modal = document.getElementById('modal');
  modal.classList.remove('mobile-tab--task', 'mobile-tab--details', 'mobile-tab--comments');
  modal.classList.add('mobile-tab--' + tab);
  // Sync right panel to correct tab
  if (tab === 'details' || tab === 'comments') {
    const panelTabEl = document.querySelector(`.panel-tab[onclick*="'${tab}'"]`);
    if (panelTabEl) switchPanelTab(tab, panelTabEl);
  }
  // Update tab bar active state
  document.querySelectorAll('.mobile-tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === tab);
  });
}

// ── Panel tabs ──
function switchPanelTab(tab, el) {
  activePanel = tab;
  document.querySelectorAll('.panel-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderPanel();
}

// ── Render ──
function render() {
  renderSidebar();
  renderStepStrip();
  renderForm();
  renderPanel();
  renderFooter();
}

function renderSidebar() {
  const el = document.getElementById('sidebarNav');
  el.innerHTML = STEPS.map((s, i) => {
    const cls = i === currentStep ? 'active' : i < currentStep ? 'done' : '';
    return `<div class="sidebar-nav-item ${cls}" onclick="goToStep(${i})">
      <span class="step-indicator"></span>
      ${s.name}
    </div>`;
  }).join('');
}

function renderSheetSteps() {
  const el = document.getElementById('sheetSteps');
  el.innerHTML = STEPS.map((s, i) => {
    const cls = i === currentStep ? 'active' : i < currentStep ? 'done' : '';
    const icon = i < currentStep
      ? `<svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M2 6L5 9L10 3" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>`
      : (i + 1);
    return `<div class="sheet-step-item ${cls}" onclick="goToStep(${i}); closeBottomSheet();">
      <div class="sheet-step-indicator">${icon}</div>
      <span class="sheet-step-name">${s.name}</span>
    </div>`;
  }).join('');
}

function renderStepStrip() {

            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" style="margin:0 auto 8px;color:var(--text-tertiary)"><path d="M21 15V19C21 19.5304 20.7893 20.0391 20.4142 20.4142C20.0391 20.7893 19.5304 21 19 21H5C4.46957 21 3.96086 20.7893 3.58579 20.4142C3.21071 20.0391 3 19.5304 3 19V15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><polyline points="17 8 12 3 7 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><line x1="12" y1="3" x2="12" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>

          </div>
          <div style="border:1px solid var(--border);border-radius:6px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between">

              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M9 2H4C3.45 2 3 2.45 3 3V13C3 13.55 3.45 14 4 14H12C12.55 14 13 13.55 13 13V6L9 2Z" stroke="var(--text-secondary)" stroke-width="1.5"/><path d="M9 2V6H13" stroke="var(--text-secondary)" stroke-width="1.5"/></svg>
              <div>
                <div style="font-size:13px;color:var(--text-primary)">CRM_Contract_2026.pdf</div>
                <div style="font-size:11px;color:var(--text-tertiary)">2.4 MB</div>
              </div>
            </div>
            <button class="icon-btn" style="color:var(--text-tertiary)">
              <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M3 3L13 13M13 3L3 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            </button>
          </div>
        </div>
      </div>`
  };

  el.innerHTML = forms[currentStep] || forms[0];
}

function renderFooter() {
  const el = document.getElementById('modalFooter');
  const isLast = currentStep === STEPS.length - 1;
  if (isLast) {
    el.innerHTML = `
      <button class="btn btn-ghost" onclick="prevStep()">Back</button>
      <button class="btn btn-danger" onclick="alert('Declined')">Decline</button>
      <button class="btn btn-primary" onclick="alert('Approved!')">Approve</button>`;
  } else {
    el.innerHTML = `
      ${currentStep > 0 ? '<button class="btn btn-ghost" onclick="prevStep()">Back</button>' : ''}
      <button class="btn btn-next" onclick="nextStep()">Next <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M6 4L10 8L6 12" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg></button>`;
  }
}

function toggleAccordion(header) {
  const body = header.nextElementSibling;
  const icon = header.querySelector('svg');
  if (!body) return;
  if (body.style.display === 'none') {
    body.style.display = '';
    icon.style.transform = 'rotate(180deg)';
  } else {
    body.style.display = 'none';
    icon.style.transform = 'rotate(0deg)';
  }
}

// Init
render();
</script>
