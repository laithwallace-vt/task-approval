<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Approval · Responsive Prototype</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --purple: #6000f0;
    --purple-light: #f0e5ff;
    --purple-dim: rgba(96, 0, 240, 0.08);
    --red: #dc2828;
    --red-light: #fef1f2;
    --green: #16a249;
    --green-light: #e8fcef;
    --amber: #f97415;
    --amber-light: #fff2eb;
    --blue: #2563eb;
    --blue-light: #eff6ff;
    --text-primary: rgba(15,23,41,1);
    --text-secondary: rgba(15,23,41,0.7);
    --text-tertiary: rgba(15,23,41,0.5);
    --text-quaternary: rgba(15,23,41,0.35);
    --border: rgba(15,23,41,0.08);
    --border-strong: rgba(15,23,41,0.12);
    --border-focus: rgba(96,0,240,0.4);
    --surface: #ffffff;
    --surface-hover: rgba(15,23,41,0.04);
    --surface-subtle: #fafbfc;
    --canvas: #eceef1;
    --radius-sm: 4px;
    --radius-md: 6px;
    --radius-lg: 8px;
    --shadow-modal: 0 8px 32px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
    --font: 'DM Sans', system-ui, -apple-system, sans-serif;
  }

  html, body {
    height: 100%;
    margin: 0;
    padding: 0;
    overflow: hidden;
  }
  body {
    font-family: var(--font);
    background: #EEEEF2;
    display: flex;
    flex-direction: column;
  }

  /* ── Breakpoint toggle bar ── */
  .bp-bar {
    background: #1A1A22;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 10px 16px;
    position: sticky;
    top: 0;
    z-index: 1000;
    flex-shrink: 0;
  }
  .bp-label {
    color: rgba(255,255,255,0.4);
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-right: 8px;
  }
  .bp-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 5px;
    color: rgba(255,255,255,0.5);
    font-family: var(--font);
    font-size: 12px;
    cursor: pointer;
    padding: 5px 12px;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .bp-btn:hover { background: rgba(255,255,255,0.14); color: #fff; }
  .bp-btn.active {
    background: var(--purple);
    border-color: var(--purple);
    color: #fff;
  }
  .bp-divider { width: 1px; height: 16px; background: rgba(255,255,255,0.1); margin: 0 8px; }

  /* ── Viewport wrapper ── */
  .viewport-wrap {
    flex: 1;
    display: flex;
    align-items: stretch;
    justify-content: center;
    padding: 0;
    overflow: hidden;
  }
  .viewport {
    width: 100%;
    max-width: 100%;
    height: 100%;
    transition: max-width 0.3s cubic-bezier(0.4,0,0.2,1);
    background: #EEEEF2;
    border-radius: 0;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .viewport.bp-900 { max-width: 900px; margin: 0 auto; }
  .viewport.bp-600 { max-width: 600px; margin: 0 auto; }
  .viewport.bp-375 { max-width: 375px; margin: 0 auto; }

  /* ── Modal scaffold ── */
  .modal-wrap {
    padding: 0;
    display: flex;
    align-items: stretch;
    justify-content: center;
    flex: 1;
    height: 100%;
  }

  .modal {
    background: var(--surface);
    border-radius: 0;
    border: none;
    box-shadow: none;
    width: 100%;
    max-width: none;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  /* ── Header (Slot 1) ── */
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    height: 48px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 12px;
  }
  .modal-header-left {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
    flex: 1;
    overflow: hidden;
  }
  .task-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .task-link {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 13px;
    color: var(--text-secondary);
    text-decoration: none;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .task-link:hover { color: var(--purple); }
  .task-link svg { flex-shrink: 0; }
  .modal-header-right {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
  }
  .header-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-right: 8px;
  }
  .meta-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 13px;
    color: var(--text-secondary);
    white-space: nowrap;
  }
  .meta-avatar {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--purple);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    color: white;
    font-weight: 500;
    flex-shrink: 0;
  }
  .icon-btn {
    width: 28px;
    height: 28px;
    border: none;
    background: transparent;
    border-radius: var(--radius-sm);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-secondary);
    transition: background 0.12s, color 0.12s;
  }
  .icon-btn:hover { background: var(--surface-hover); color: var(--text-primary); }

  /* ── Step strip (mobile stepper - Slot 1.5) ── */
  .step-strip {
    display: none;
    align-items: center;
    padding: 0 16px;
    height: 40px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    gap: 8px;
    flex-shrink: 0;
  }
  .step-back-btn {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 13px;
    color: var(--text-secondary);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    flex-shrink: 0;
  }
  .step-back-btn:hover { color: var(--purple); }
  .step-strip-center {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    min-width: 0;
  }
  .step-strip-label {
    font-size: 13px;
    color: var(--text-primary);
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .step-strip-count {
    font-size: 12px;
    color: var(--text-tertiary);
    flex-shrink: 0;
  }
  .step-progress-wrap {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .step-progress-track {
    width: 56px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .step-progress-fill {
    height: 100%;
    background: var(--purple);
    border-radius: 2px;
    transition: width 0.25s ease;
  }
  /* Step dots for very small */
  .step-dots {
    display: flex;
    gap: 4px;
    align-items: center;
  }
  .step-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.2s;
  }
  .step-dot.active { background: var(--purple); }
  .step-dot.done { background: var(--purple); opacity: 0.4; }

  /* ── Body layout (Slot 2 + 3) ── */
  .modal-body {
    display: grid;
    grid-template-columns: 200px 1fr 280px;
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }

  /* ── Sidebar nav (left) ── */
  .sidebar-nav {
    border-right: 1px solid var(--border);
    padding: 16px 0;
    overflow-y: auto;
  }
  .sidebar-nav-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 16px;
    font-size: 13px;
    color: var(--text-secondary);
    cursor: pointer;
    transition: background 0.1s, color 0.1s;
    position: relative;
  }
  .sidebar-nav-item:hover { background: var(--surface-hover); color: var(--text-primary); }
  .sidebar-nav-item.active {
    color: var(--purple);
    background: var(--purple-dim);
    font-weight: 500;
  }
  .sidebar-nav-item.active::before {
    content: '';
    position: absolute;
    left: 0;
    top: 4px;
    bottom: 4px;
    width: 3px;
    background: var(--purple);
    border-radius: 0 2px 2px 0;
  }
  .step-indicator {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    border: 1.5px solid var(--text-tertiary);
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .sidebar-nav-item.active .step-indicator {
    background: var(--purple);
    border-color: var(--purple);
  }
  .sidebar-nav-item.done .step-indicator {
    background: var(--green);
    border-color: var(--green);
  }

  /* ── Form body (centre) ── */
  .form-pane {
    overflow-y: auto;
    padding: 32px 24px;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    background: var(--surface-subtle);
  }
  .form-content-wrapper {
    width: 100%;
    max-width: 900px;
    display: flex;
    flex-direction: column;
    min-height: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 40px;
    flex-shrink: 0;
  }
  .form-body-content {
    flex: 1;
  }
  .form-actions {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 32px;
    margin-top: 40px;
    border-top: 1px solid var(--border);
    gap: 12px;
  }
  .section-accordion {
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-bottom: 12px;
  }
  .section-accordion-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    cursor: pointer;
    background: var(--surface);
    transition: background 0.1s;
    user-select: none;
  }
  .section-accordion-header:hover { background: var(--surface-hover); }
  .section-accordion-body { padding: 16px; border-top: 1px solid var(--border); }

  .form-section-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    margin-bottom: 4px;
  }
  .form-section-sub {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 16px;
  }
  .form-group {
    margin-bottom: 16px;
  }
  .form-label {
    font-size: 13px;
    color: var(--text-primary);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 3px;
  }
  .required-star { color: var(--red); }
  .form-input {
    width: 100%;
    height: 32px;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 0 10px;
    font-size: 13px;
    font-family: var(--font);
    color: var(--text-primary);
    background: var(--surface);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .form-input:focus {
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px rgba(96,0,240,0.1);
  }
  .form-input.with-icon { padding-left: 28px; }
  .input-wrap { position: relative; }
  .input-icon {
    position: absolute;
    left: 8px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-tertiary);
    pointer-events: none;
  }
  .form-textarea {
    width: 100%;
    min-height: 72px;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 8px 10px;
    font-size: 13px;
    font-family: var(--font);
    color: var(--text-secondary);
    background: var(--surface);
    outline: none;
    resize: vertical;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .form-textarea:focus {
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px rgba(96,0,240,0.1);
  }
  .radio-group { display: flex; flex-direction: column; gap: 8px; }
  .radio-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-primary);
    cursor: pointer;
  }
  .radio-item input[type="radio"] { accent-color: var(--purple); width: 14px; height: 14px; cursor: pointer; }

  /* ── Right panel (Slot 3) ── */
  .details-panel {
    overflow-y: auto;
    padding: 0;
  }
  .panel-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 1;
  }
  .panel-tab {
    font-size: 13px;
    color: var(--text-secondary);
    padding: 12px 0;
    margin-right: 20px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .panel-tab:hover { color: var(--text-primary); }
  .panel-tab.active {
    color: var(--purple);
    border-bottom-color: var(--purple);
    font-weight: 500;
  }
  .panel-content { padding: 16px; }
  .ai-card {
    border: 1px solid var(--purple);
    border-radius: var(--radius-lg);
    padding: 12px;
    margin-bottom: 16px;
    background: var(--purple-light);
  }
  .ai-card-header {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 500;
    color: var(--purple);
    margin-bottom: 6px;
  }
  .ai-card-body {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.5;
    margin-bottom: 8px;
  }
  .ai-card-footer {
    font-size: 11px;
    color: var(--text-tertiary);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .meta-row {
    display: flex;
    flex-direction: column;
    gap: 2px;
    margin-bottom: 14px;
  }
  .meta-row-label {
    font-size: 11px;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .meta-row-value {
    font-size: 13px;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .budget-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 11px;
    color: var(--green);
    background: var(--green-light);
    border-radius: 10px;
    padding: 1px 6px;
  }
  .line-items-section { margin-top: 4px; }
  .line-items-header {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }
  .line-item {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
  }
  .line-item:last-child { border-bottom: none; }
  .line-item-name { font-size: 13px; color: var(--text-primary); }
  .line-item-type { font-size: 11px; color: var(--text-tertiary); margin-top: 1px; }
  .line-item-amount { font-size: 13px; font-weight: 500; color: var(--text-primary); }

  /* ── Footer - REMOVED TO INLINE ── */
  .modal-footer {
    display: none;
  }
  .btn {
    height: 32px;
    border-radius: var(--radius-md);
    border: none;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    padding: 0 14px;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn-ghost {
    background: transparent;
    color: var(--text-secondary);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--surface-hover); color: var(--text-primary); }
  .btn-danger {
    background: var(--red);
    color: white;
  }
  .btn-danger:hover { background: #c93530; }
  .btn-primary {
    background: var(--purple);
    color: white;
  }
  .btn-primary:hover { background: #5200d0; }
  .btn-next {
    background: var(--purple);
    color: white;
  }
  .btn-next:hover { background: #5200d0; }

  /* ── Bottom sheet (mobile) ── */
  .bottom-sheet-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 500;
    opacity: 0;
    transition: opacity 0.25s;
  }
  .bottom-sheet-overlay.open {
    display: block;
    opacity: 1;
  }
  .bottom-sheet {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    border-radius: 12px 12px 0 0;
    padding: 0 0 env(safe-area-inset-bottom, 0);
    z-index: 501;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    max-height: 75vh;
    overflow-y: auto;
  }
  .bottom-sheet.open {
    transform: translateY(0);
  }
  .sheet-handle {
    width: 32px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 12px auto 0;
  }
  .sheet-header {
    padding: 12px 16px 8px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    border-bottom: 1px solid var(--border);
  }
  .sheet-steps {
    padding: 8px 0 16px;
  }
  .sheet-step-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    cursor: pointer;
    transition: background 0.1s;
  }
  .sheet-step-item:hover { background: var(--surface-hover); }
  .sheet-step-indicator {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-tertiary);
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .sheet-step-item.active .sheet-step-indicator {
    background: var(--purple);
    border-color: var(--purple);
    color: white;
  }
  .sheet-step-item.done .sheet-step-indicator {
    background: var(--green);
    border-color: var(--green);
    color: white;
  }
  .sheet-step-name { font-size: 13px; color: var(--text-primary); }
  .sheet-step-item.active .sheet-step-name { font-weight: 500; color: var(--purple); }
  .sheet-step-item.done .sheet-step-name { color: var(--text-secondary); }

  /* ── BREAKPOINT RESPONSIVE RULES ── */

  /* 900px: Collapse sidebar → step strip, panel stays as tab */
  @media (max-width: 900px) {
    .modal-wrap { padding: 16px; }
    .modal-body { grid-template-columns: 1fr 280px; }
    .sidebar-nav { display: none; }
    .step-strip { display: flex; }
    .header-meta { display: none; }
  }

  /* 700px: Stack panel under form (full width tabs) */
  @media (max-width: 700px) {
    .modal-body { grid-template-columns: 1fr; }
    .form-pane { border-right: none; }
    .details-panel { border-top: 1px solid var(--border); }
    .panel-tabs { position: relative; }
  }

  /* 480px: Compact header, details panel as bottom-accessible */
  @media (max-width: 480px) {
    .modal-wrap { padding: 8px; }
    .task-link .link-text { display: none; }
    .step-strip-label { font-size: 12px; }
    .form-pane { padding: 16px; }
    .panel-content { padding: 12px; }
    .modal-footer {
      padding: 10px 12px;
    }
    /* On mobile, show step count as dots not text */
    .step-strip-count { display: none; }
  }

  /* ── Viewport-scoped overrides (for the demo toggle) ── */
  .viewport.bp-900 .modal-body { grid-template-columns: 1fr 280px; }
  .viewport.bp-900 .sidebar-nav { display: none; }
  .viewport.bp-900 .step-strip { display: flex; }
  .viewport.bp-900 .header-meta { display: none; }

  .viewport.bp-600 .modal-body { grid-template-columns: 1fr; }
  .viewport.bp-600 .sidebar-nav { display: none; }
  .viewport.bp-600 .step-strip { display: flex; }
  .viewport.bp-600 .header-meta { display: none; }
  .viewport.bp-600 .form-pane { border-right: none; }
  .viewport.bp-600 .details-panel { border-top: 1px solid var(--border); }

  /* bp-375: Full-screen modal */
  .viewport.bp-375 .modal-wrap { padding: 0; min-height: 100%; align-items: stretch; }
  .viewport.bp-375 .modal { border-radius: 0; height: 100%; max-height: none; box-shadow: none; border-left: none; border-right: none; border-bottom: none; }

  /* bp-375: Header */
  .viewport.bp-375 .header-meta { display: none; }
  .viewport.bp-375 .task-link { display: none; }
  .viewport.bp-375 #btnSteps { display: none; }
  .viewport.bp-375 #btnEdit { display: none; }
  .viewport.bp-375 #btnActivity { display: none; }

  /* bp-375: Show mobile tab bar, hide redundant panel tabs */

<script>
const ARCHETYPES = {
  intake: {
    steps: [
      { id: 0, name: 'Renewal reason',    pageTitle: 'Renewal reason'    },
      { id: 1, name: 'Contract details',  pageTitle: 'Contract details'  },
      { id: 2, name: 'Select products',   pageTitle: 'Select products'   },
      { id: 3, name: 'Additional info',   pageTitle: 'Additional information' },
      { id: 4, name: 'Upload documents',  pageTitle: 'Upload documents'  },
    ]
  },
  manager: {
    steps: [
      { id: 0, name: 'Approval summary', pageTitle: 'Approval summary' }
    ]
  },
  comparison: {
    steps: [
      { id: 0, name: 'Review offers', pageTitle: 'Review offers' },
      { id: 1, name: 'Confirm decision', pageTitle: 'Confirm decision' }
    ]
  },
  multi: {
    steps: [
      { id: 0, name: 'Manager Review', pageTitle: 'Manager Review' },
      { id: 1, name: 'Finance Review', pageTitle: 'Finance Review' },
      { id: 2, name: 'Legal Review', pageTitle: 'Legal Review' },
      { id: 3, name: 'CPO Review', pageTitle: 'CPO Review' }
    ]
  }
};

let currentArchetype = 'intake';
let currentStep = 0;
let activePanel = 'details';

function getSteps() {
  return ARCHETYPES[currentArchetype].steps;
}

// ── Archetype toggle ──
function switchArchetype(type, btn) {
  currentArchetype = type;
  currentStep = 0;
  
  // Update buttons
  document.querySelectorAll('.bp-bar .bp-btn').forEach(b => {
    if (b.getAttribute('onclick') && b.getAttribute('onclick').includes('switchArchetype')) {
      b.classList.remove('active');
    }
  });
  if (btn) btn.classList.add('active');

  // Update step buttons visibility
  const steps = getSteps();
  for (let i = 1; i <= 5; i++) {
    const sbtn = document.getElementById('step-btn-' + i);
    if (sbtn) {
      sbtn.style.display = i <= steps.length ? 'flex' : 'none';
      sbtn.classList.toggle('active', i === 1);
    }
  }

  render();
}

// ── Breakpoint toggle ──
function setBreakpoint(bp, btn) {
  const vp = document.getElementById('viewport');
  vp.className = 'viewport' + (bp === 'full' ? '' : ' ' + bp);
  document.querySelectorAll('.bp-bar .bp-btn').forEach(b => {
    if (b.getAttribute('onclick') && b.getAttribute('onclick').includes('setBreakpoint')) {
      b.classList.remove('active');
    }
  });
  btn.classList.add('active');
}

// ── Step navigation ──
function goToStep(n) {
  const steps = getSteps();
  if (n >= 0 && n < steps.length) {
    currentStep = n;
    // Update active step button
    for (let i = 1; i <= 5; i++) {
      const sbtn = document.getElementById('step-btn-' + i);
      if (sbtn) sbtn.classList.toggle('active', i === n + 1);
    }
    render();
  }
}
function nextStep() {
  const steps = getSteps();
  if (currentStep < steps.length - 1) { 
    currentStep++; 
    goToStep(currentStep);
  }
}
function prevStep() {
  if (currentStep > 0) { 
    currentStep--; 
    goToStep(currentStep);
  }
}

// ── Bottom sheet ──
function openBottomSheet() {
  document.getElementById('sheetOverlay').classList.add('open');
  document.getElementById('bottomSheet').classList.add('open');
  renderSheetSteps();
}
function closeBottomSheet() {
  document.getElementById('sheetOverlay').classList.remove('open');
  document.getElementById('bottomSheet').classList.remove('open');
}

// ── Mobile tab bar (375px) ──
function switchMobileTab(tab) {
  const modal = document.getElementById('modal');
  modal.classList.remove('mobile-tab--task', 'mobile-tab--details', 'mobile-tab--comments');
  modal.classList.add('mobile-tab--' + tab);
  // Sync right panel to correct tab
  if (tab === 'details' || tab === 'comments') {
    const panelTabEl = document.querySelector(`.panel-tab[onclick*="'${tab}'"]`);
    if (panelTabEl) switchPanelTab(tab, panelTabEl);
  }
  // Update tab bar active state
  document.querySelectorAll('.mobile-tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === tab);
  });
}

// ── Panel tabs ──
function switchPanelTab(tab, el) {
  activePanel = tab;
  document.querySelectorAll('.panel-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderPanel();
}

// ── Render ──
function render() {
  const modal = document.getElementById('modal');
  const steps = getSteps();
  
  // Header title update
  const titleEl = document.querySelector('.task-title');
  if (currentArchetype === 'manager') titleEl.textContent = 'Manager Approval';
  else if (currentArchetype === 'comparison') titleEl.textContent = 'Offer Comparison';
  else if (currentArchetype === 'multi') titleEl.textContent = 'Sequential Approval';
  else titleEl.textContent = 'Intake Form';

  // Toggle layout classes
  modal.className = modal.className.split(' ').filter(c => !c.startsWith('archetype-')).join(' ');
  modal.classList.add('archetype-' + currentArchetype);

  renderSidebar();
  renderStepStrip();
  renderForm();
  renderPanel();
}

function renderSidebar() {
  const el = document.getElementById('sidebarNav');
  const steps = getSteps();
  
  if (currentArchetype === 'manager') {
    el.closest('.modal-body').style.gridTemplateColumns = '1fr 280px';
    el.style.display = 'none';
    return;
  } else {
    el.closest('.modal-body').style.gridTemplateColumns = '200px 1fr 280px';
    el.style.display = '';
  }

  el.innerHTML = steps.map((s, i) => {
    const cls = i === currentStep ? 'active' : i < currentStep ? 'done' : '';
    return `<div class="sidebar-nav-item ${cls}" onclick="goToStep(${i})">
      <span class="step-indicator"></span>
      ${s.name}
    </div>`;
  }).join('');
}

function renderSheetSteps() {
  const el = document.getElementById('sheetSteps');
  const steps = getSteps();
  el.innerHTML = steps.map((s, i) => {
    const cls = i === currentStep ? 'active' : i < currentStep ? 'done' : '';
    const icon = i < currentStep
      ? `<svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M2 6L5 9L10 3" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>`
      : (i + 1);
    return `<div class="sheet-step-item ${cls}" onclick="goToStep(${i}); closeBottomSheet();">
      <div class="sheet-step-indicator">${icon}</div>
      <span class="sheet-step-name">${s.name}</span>
    </div>`;
  }).join('');
}

function renderStepStrip() {
  const steps = getSteps();
  const s = steps[currentStep];
  const strip = document.getElementById('stepStrip');
  
  if (currentArchetype === 'manager') {
    strip.style.display = 'none';
    return;
  }
  
  // Responsive rules might override display: none, so we force flex if not manager
  if (window.innerWidth <= 900) strip.style.display = 'flex';
  
  document.getElementById('stepStripLabel').textContent = s.pageTitle;
  document.getElementById('stepStripCount').textContent = `${currentStep + 1} of ${steps.length}`;
  document.getElementById('stepProgressFill').style.width = `${((currentStep + 1) / steps.length) * 100}%`;
  const backBtn = document.getElementById('backBtn');
  backBtn.style.visibility = currentStep === 0 ? 'hidden' : 'visible';
}

function renderForm() {
  const el = document.getElementById('formPane');
  const steps = getSteps();
  const s = steps[currentStep];
  let contentHTML = '';

  if (currentArchetype === 'manager') {
    contentHTML = `
      <div style="background:var(--surface-subtle); border:1px solid var(--border); border-radius:var(--radius-lg); padding:20px; margin-bottom:20px;">
        <div class="form-section-title" style="font-size:14px; margin-bottom:12px;">Request Summary</div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:16px;">
          <div>
            <div style="font-size:11px; color:var(--text-tertiary); text-transform:uppercase; margin-bottom:4px;">Requester</div>
            <div style="display:flex; align-items:center; gap:8px;">
              <div class="meta-avatar" style="width:24px; height:24px; font-size:10px;">SR</div>
              <span style="font-size:14px; color:var(--text-primary);">Sarah Ridley</span>
            </div>
          </div>
          <div>
            <div style="font-size:11px; color:var(--text-tertiary); text-transform:uppercase; margin-bottom:4px;">Amount</div>
            <div style="font-size:18px; font-weight:600; color:var(--text-primary);">£12,400.00</div>
          </div>
          <div>
            <div style="font-size:11px; color:var(--text-tertiary); text-transform:uppercase; margin-bottom:4px;">Category</div>
            <div style="font-size:14px; color:var(--text-primary);">Software & SaaS</div>
          </div>
          <div>
            <div style="font-size:11px; color:var(--text-tertiary); text-transform:uppercase; margin-bottom:4px;">Urgency</div>
            <span style="font-size:11px; background:var(--amber-light); color:var(--amber); padding:2px 8px; border-radius:10px; font-weight:500;">Medium Priority</span>
          </div>
        </div>
        <div style="margin-top:16px; padding-top:16px; border-top:1px solid var(--border);">
          <div style="font-size:11px; color:var(--text-tertiary); text-transform:uppercase; margin-bottom:4px;">Description</div>
          <div style="font-size:13px; color:var(--text-secondary); line-height:1.5;">Annual renewal for Adobe Creative Cloud (15 licenses) for the design team. Includes Photoshop, Illustrator, and Figma integration.</div>
        </div>
      </div>

      <div style="border:1px solid var(--green); background:var(--green-light); border-radius:var(--radius-lg); padding:16px; margin-bottom:20px;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
          <div style="display:flex; align-items:center; gap:6px; font-size:13px; font-weight:500; color:var(--green);">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M2 13L5 5L11 2L8 10L2 13Z" stroke="currentColor" stroke-width="1.5"/></svg>
            Budget Impact
          </div>
          <span style="font-size:12px; font-weight:600; color:var(--green);">72% Used</span>
        </div>
        <div style="height:6px; background:rgba(22,162,73,0.15); border-radius:3px; overflow:hidden; margin-bottom:8px;">
          <div style="width:72%; height:100%; background:var(--green); border-radius:3px;"></div>
        </div>
        <div style="display:flex; justify-content:space-between; font-size:12px; color:var(--text-secondary);">
          <span>Remaining: £4,600.00</span>
          <span style="color:var(--text-tertiary);">Total: £25,000.00</span>
        </div>
      </div>
    `;
  } else if (currentArchetype === 'comparison') {
    if (currentStep === 0) {
      contentHTML = `
        <div style="margin-bottom:24px;">
           <div class="form-section-title" style="font-size:14px; margin-bottom:16px;">Vendor Comparison</div>
           <div style="display:grid; grid-template-columns: 1fr 1fr; gap:16px;">
              <div style="border:2px solid var(--purple); background:var(--purple-dim); border-radius:var(--radius-lg); padding:16px; position:relative;">

              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M9 2H4C3.45 2 3 2.45 3 3V13C3 13.55 3.45 14 4 14H12C12.55 14 13 13.55 13 13V6L9 2Z" stroke="var(--text-secondary)" stroke-width="1.5"/><path d="M9 2V6H13" stroke="var(--text-secondary)" stroke-width="1.5"/></svg>

                <div style="font-size:13px;color:var(--text-primary)">CRM_Contract_2026.pdf</div>

function renderPanel() {
  const el = document.getElementById('panelContent');
  if (activePanel === 'comments') {
    el.innerHTML = `
      <div style="text-align:center;padding:40px 0">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" style="margin:0 auto 8px;color:var(--text-tertiary)"><path d="M21 15C21 15.5304 20.7893 16.0391 20.4142 16.4142C20.0391 16.7893 19.5304 17 19 17H7L3 21V5C3 4.46957 3.21071 3.96086 3.58579 3.58579C3.96086 3.21071 4.46957 3 5 3H19C19.5304 3 20.0391 3.21071 20.4142 3.58579C20.7893 3.96086 21 4.46957 21 5V15Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <div style="font-size:13px;color:var(--text-tertiary)">No comments yet</div>
      </div>
      <div style="margin-top:8px">
        <textarea class="form-textarea" placeholder="Add a comment…" style="min-height:60px;resize:none"></textarea>
      </div>`;
    return;
  }

  el.innerHTML = `
    <div class="ai-card">
      <div class="ai-card-header">Recommend Request</div>
      <div class="ai-card-body">Request is within budget with clear business justification.</div>
    </div>
    <div style="margin-top:24px;">
       <div class="form-section-title" style="font-size:12px; margin-bottom:12px;">Approval Chain</div>
       <div style="display:flex; flex-direction:column; gap:12px;">
          <div style="display:flex; align-items:center; gap:10px;">
             <div style="width:20px; height:20px; border-radius:10px; background:var(--green); color:white; display:flex; align-items:center; justify-content:center; font-size:10px;">✓</div>
             <div style="font-size:13px;">Team Lead <span style="color:var(--text-tertiary); font-size:11px;">(Approved)</span></div>
          </div>
          <div style="display:flex; align-items:center; gap:10px;">
             <div style="width:20px; height:20px; border-radius:10px; background:var(--purple); color:white; display:flex; align-items:center; justify-content:center; font-size:10px;">2</div>
             <div style="font-size:13px; font-weight:600;">Finance Review <span style="color:var(--purple); font-size:11px;">(Current)</span></div>
          </div>
          <div style="display:flex; align-items:center; gap:10px; opacity:0.5;">
             <div style="width:20px; height:20px; border-radius:10px; background:var(--surface-sunken); color:var(--text-tertiary); display:flex; align-items:center; justify-content:center; font-size:10px;">3</div>
             <div style="font-size:13px;">Legal Counsel</div>
          </div>
       </div>
    </div>
  `;
}

function getActionsHTML() {
  const steps = getSteps();
  const isFirst = currentStep === 0;
  const isLast = currentStep === steps.length - 1;

  if (currentArchetype === 'manager') {
    return `
      <div style="display:flex; gap:12px;">
        <button class="btn btn-ghost" onclick="document.getElementById('delegate-picker').style.display='block'">Delegate</button>
        <button class="btn btn-danger" onclick="document.getElementById('decline-reason').style.display='block'">Decline</button>
      </div>
      <button class="btn btn-primary" onclick="alert('Approved!')">Approve Request</button>`;
  } else if (isLast) {
    return `
      <div style="display:flex; gap:12px;">
        <button class="btn btn-ghost" onclick="prevStep()">Back</button>
        <button class="btn btn-ghost">Save Draft</button>
      </div>
      <button class="btn btn-primary" onclick="alert('Submitted!')">Submit</button>`;
  } else {
    return `
      <div style="display:flex; gap:12px;">
         <button class="btn btn-ghost" onclick="prevStep()" style="${isFirst ? 'display:none' : ''}">Back</button>
         <button class="btn btn-ghost">Save Draft</button>
      </div>
      <button class="btn btn-next" onclick="nextStep()">Next <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M6 4L10 8L6 12" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg></button>`;
  }
}

function renderFooter() {
  // HIDDEN - ACTIONS ARE NOW INLINE
}

function toggleAccordion(header) {
  const body = header.nextElementSibling;
  const icon = header.querySelector('svg');
  if (!body) return;
  if (body.style.display === 'none') {
    body.style.display = '';
    icon.style.transform = 'rotate(180deg)';
  } else {
    body.style.display = 'none';
    icon.style.transform = 'rotate(0deg)';
  }
}

// Init
render();
</script>
</body>
